[workspace]
authors = ["Jakub Wlodek <jwlodek@bnl.gov>"]
channels = ["conda-forge"]
name = "SmarPod"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
lint = "pre-commit run --all-files"
build = "make -sj"
make-paramdefs = "epicsdbtools paramdefs SmarPodApp/Db SmarPodApp/src -p SP"
make-bobfiles = "epicsdb2bob SmarPodApp/Db SmarPodApp/op/bob/autogenerated -d -r _RBV -t none"
ioc = "cd iocs/SmarPodIOC/iocBoot/iocSmarPod && ./st.cmd"

[dependencies]
pre-commit = ">=4.5.1,<5"
clang-format = ">=21.1.8,<22"

[pypi-dependencies]
epicsdbtools = { git = "https://github.com/jwlodek/epicsdbtools.git" }
epicsdb2bob = { git = "https://github.com/NSLS2/epicsdb2bob.git" }
